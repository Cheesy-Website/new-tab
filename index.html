<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Content Container -->
    <div class="main-container">
        <!-- Minimalistic Stylized Logo -->
        <div class="logo" id="ui-logo">New Tab Remake</div>

        <!-- Google Search Processing -->
        <form class="search-form" action="https://google.com" method="get">
            <div class="search-box">
                <input type="text" name="q" placeholder="" autocomplete="off" autofocus>
            </div>
        </form>
        

        <!-- Dynamic Target Grid Shortcuts -->
        <div class="shortcuts-grid">
            <a href="https://github.com" class="shortcut-item">
                <div class="shortcut-tile">🐙</div>
                <div class="shortcut-title">GitHub</div>
            </a>
            <a href="https://youtube.com" class="shortcut-item">
                <div class="shortcut-tile">📺</div>
                <div class="shortcut-title">YouTube</div>
            </a>
            <a href="https://gmail.com" class="shortcut-item">
                <div class="shortcut-tile">✉️</div>
                <div class="shortcut-title">Gmail</div>
            </a>
        </div>
    </div>

    <!-- Toggle Controls -->


    <!-- Link to external modular logic -->
    <script src="script.js"></script>
</body>
</html>
