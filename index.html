<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



        <!-- Dynamic Target Grid Shortcuts -->
        <div class="shortcuts-grid">
            <a href="https://github.com" class="shortcut-item">
                <div class="shortcut-tile">🐙</div>
                <div class="shortcut-title">GitHub</div>
            </a>
            <a href="https://youtube.com" class="shortcut-item">
                <div class="shortcut-tile">📺</div>
                <div class="shortcut-title">YouTube</div>
            </a>
            <a href="https://gmail.com" class="shortcut-item">
                <div class="shortcut-tile">✉️</div>
                <div class="shortcut-title">Gmail</div>
            </a>
        </div>
    </div>

    <!-- Toggle Controls -->
    <button class="customizer-btn" id="customizerBtn">⚙️ Customize</button>

    <div class="customizer-panel" id="panel">
        <div class="panel-section">
            <h3>Visual Colors</h3>
            <div class="control-group">
                <label>Text Color</label>
                <input type="color" id="textColorPicker">
            </div>
            <div class="control-group">
                <label>Accent Focus</label>
                <input type="color" id="accentColorPicker">
            </div>
            <div class="control-group">
                <label>Logo Color</label>
                <input type="color" id="logoColorPicker">
            </div>
        </div>

        <div class="panel-section">
            <h3>Animated Background (.gif)</h3>
            <label class="file-label" for="gif-upload">Upload GIF or Image</label>
            <input type="file" id="gif-upload" accept="image/gif, image/png, image/jpeg, image/webp">
        </div>

        <button class="reset-btn" id="resetBtn">Reset to Defaults</button>
    </div>

    <!-- Link to external modular logic -->
    <script src="script.js"></script>
</body>
</html>
