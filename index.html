<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab Remake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="logo" id="ui-logo">New Tab Remake</div>

        <form class="search-form" action="https://google.com" method="get">
            <div class="search-box">
                <input type="text" name="q" placeholder="Look up academic data..." autocomplete="off" autofocus>
            </div>
        </form>

        <!-- The grid is now empty; JavaScript builds this dynamically -->
        <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </div>

    <button class="customizer-btn" id="customizerBtn">🎨 Theme & Tiles</button>

    <div class="customizer-panel" id="panel">
        <div class="panel-section">
            <h3>Add New Tile</h3>
            <div class="control-group">
                <input type="text" id="tileName" placeholder="Site Name (e.g. Drive)" style="width:100%; padding:6px; margin-bottom:8px; border-radius:4px; border:1px solid #444; background:#222; color:#fff;">
            </div>
            <div class="control-group">
                <input type="text" id="tileUrl" placeholder="URL (https://...)" style="width:100%; padding:6px; margin-bottom:8px; border-radius:4px; border:1px solid #444; background:#222; color:#fff;">
            </div>
            <button class="file-label" id="addTileBtn" style="border:none; width:100%;">Add Shortcut</button>
        </div>

        <div class="panel-section">
            <h3>Visual Colors</h3>
            <div class="control-group">
                <label>Main Text</label>
                <input type="color" id="textColorPicker">
            </div>
            <div class="control-group">
                <label>Border Accent</label>
                <input type="color" id="accentColorPicker">
            </div>
            <div class="control-group">
                <label>Header Text</label>
                <input type="color" id="logoColorPicker">
            </div>
        </div>

        <div class="panel-section">
            <h3>Visual Style</h3>
            <label class="file-label" for="gif-upload">Set Background Graphic</label>
            <input type="file" id="gif-upload" accept="image/gif, image/png, image/jpeg, image/webp">
        </div>

        <button class="reset-btn" id="resetBtn">Clear Settings</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
