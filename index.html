<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newer Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="logo" id="ui-logo">Newer Tab</div>

<form class="search-form" action="https://www.google.com/search" method="get">
    <div class="search-box">
        <input type="text" name="q" placeholder="Search Google" autocomplete="off" autofocus>
    </div>
</form>

        <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </div>

    <button class="customizer-btn" id="customizerBtn">🎨 Theme & Tiles</button>

    <div class="customizer-panel" id="panel">
        <div class="panel-section">
            <h3>Add New Tile</h3>
            <div class="control-group">
                <input type="text" id="tileName" placeholder="Site Name (e.g. Wiki)" style="width:100%; padding:6px; margin-bottom:8px; border-radius:4px; border:1px solid #444; background:#222; color:#fff;">
            </div>
            <div class="control-group">
                <input type="text" id="tileUrl" placeholder="URL (https://...)" style="width:100%; padding:6px; margin-bottom:8px; border-radius:4px; border:1px solid #444; background:#222; color:#fff;">
            </div>
            <button class="file-label" id="addTileBtn" style="border:none; width:100%;">Add Shortcut</button>
        </div>

        <div class="panel-section">
            <h3>Visual Colors</h3>
            <div class="control-group">
                <label>Main Text</label>
                <input type="color" id="textColorPicker">
            </div>
            <div class="control-group">
                <label>Border Accent</label>
                <input type="color" id="accentColorPicker">
            </div>
            <div class="control-group">
                <label>Header Text</label>
                <input type="color" id="logoColorPicker">
            </div>
        </div>

        <div class="panel-section">
            <h3>Visual Style / Background</h3>
            <!-- Clean file selection section with no link inputs -->
            <div class="control-group" style="display: block;">
                <label style="display:block; margin-bottom:6px; font-size: 13px; font-weight: bold; color: #fff;">Upload Background Image</label>
                <input type="file" id="bgFileInput" accept="image" style="display: block; width: 100%; background: #222; color: #fff; padding: 8px; border: 1px solid #444; border-radius: 4px; box-sizing: border-box;">
            </div>
            
            <div id="bgMessage" style="font-size: 13px; margin-top: 8px; text-align: center; font-weight: 500;"></div>
        </div>

        <button class="reset-btn" id="resetBtn">Clear Settings</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
